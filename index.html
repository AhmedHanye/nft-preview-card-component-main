<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta content="IE=edge" http-equiv="X-UA-Compatible" />
    <meta
      name="description"
      content="Frontend Mentor | NFT preview card component"
    />
    <!-- CSS Normalize File -->
    <link rel="stylesheet" href="./CSS/normalize.css" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="./CSS/all.min.css" />
    <!-- CSS Main File -->
    <link rel="stylesheet" href="./CSS/main.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <title>Frontend Mentor | NFT preview card component</title>
  </head>
  <body>
    <main id="NFT">
      <picture id="NFT-img">
        <img
          src="./images/image-equilibrium.jpg"
          width="320"
          height="320"
          alt="equilibrium image"
        />
        <i class="fa-solid fa-eye"></i>
      </picture>
      <div id="details">
        <h1><a href="#">Equilibrium #3429</a></h1>
        <p>Our Equilibrium collection promotes balance and calm.</p>
      </div>
      <div id="balance-calm">
        <span><i class="fa-solid fa-coins"></i>0.041 ETH</span>
        <span><i class="fa-solid fa-clock"></i>3 days left</span>
      </div>
      <div id="creator">
        <img
          src="./images/image-avatar.png"
          width="35"
          height="35"
          alt="image avatar"
        />
        <p>Creation of<a href="#" id="name">Jules Wyvern</a></p>
      </div>
    </main>
    <footer>
      <p>
        Challenge by
        <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
          >Frontend Mentor</a
        >. Coded by
        <a href="https://github.com/AhmedHanye" target="_blank">Ahmed Hanye</a>.
      </p>
    </footer>
  </body>
</html>
